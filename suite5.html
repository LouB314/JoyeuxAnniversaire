    <link rel="stylesheet" href="style5.css">
    <title></title>
</head>

    <audio id="music">
        <source src="Roxanne.m4a" type="audio/mpeg">
    </audio>

            { time: 83.3, text: "[Musique]" },

            { time: 90.8, text: "I loved you since I knew you" },

            { time: 94.4, text: "I wouldn't talk down to you" },

            { time: 181.6, text: "Roxanne (put on the red light)" }

        ];



        // Lance la musique
        window.addEventListener("load", () => {

            music.play().catch(() => {

                console.log("Le navigateur attend une interaction.");

            });

        });

        // Synchronisation des paroles
        let current = -1;

        music.addEventListener("timeupdate", () => {

            console.log(music.currentTime);

            // Affiche le bouton Skip après 82 secondes
            if (music.currentTime >= 82) {
                skip.classList.add("show");
            }

            const percent = Math.min((music.currentTime / 82) * 100, 100);

            fill.style.width = percent + "%";

            if (percent >= 100) {

                skip.classList.add("ready");

            }

            for (let i = lines.length - 1; i >= 0; i--) {

                if (music.currentTime >= lines[i].time) {

                    if (i !== current) {

                        current = i;

                        lyrics.style.opacity = "0";
                        lyrics.style.transform = "translateY(20px)";

                        setTimeout(() => {

                            lyrics.textContent = lines[i].text;

                            lyrics.style.opacity = "1";
                            lyrics.style.transform = "translateY(0)";

                        }, 200);

                    }

                    break;
                }

            }

        });

        skip.addEventListener("click", () => {

            if (!skip.classList.contains("ready")) return;

            window.location.href = "suite6.html";

        });
    </script>

</body>

</html>
